name: Deploy

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bj-auth

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew test

  build-and-push:
    needs: test
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Sync env + deploy
        run: |
          ENV_PAYLOAD=$(jq -nc --argjson env '${{ toJSON(secrets) }}' '{target: "bj-auth", env: $env, restart: false}')
          ENV_SIG=$(echo -n "$ENV_PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print "sha256=" $2}')
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}/webhook/env-sync" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $ENV_SIG" \
            -d "$ENV_PAYLOAD"

          DEPLOY_PAYLOAD='{"image":"${{ env.IMAGE_NAME }}:${{ github.sha }}"}'
          DEPLOY_SIG=$(echo -n "$DEPLOY_PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print "sha256=" $2}')
          curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}/webhook/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $DEPLOY_SIG" \
            -d "$DEPLOY_PAYLOAD"
