<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BJ Auth</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e7;
            --panel: #fffdf8;
            --line: #dccfb7;
            --text: #2f281f;
            --muted: #786c5c;
            --accent: #a64b2a;
            --accent-dark: #7d361c;
            --shadow: 0 24px 60px rgba(63, 43, 19, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                    radial-gradient(circle at top center, rgba(255, 235, 183, 0.6), transparent 30%),
                    linear-gradient(180deg, #faf6eb 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Iowan Old Style", "Apple SD Gothic Neo", Georgia, serif;
        }

        main {
            width: min(920px, calc(100% - 32px));
            margin: 52px auto;
        }

        .shell {
            border: 1px solid var(--line);
            border-radius: 26px;
            overflow: hidden;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 34px;
            border-bottom: 1px solid var(--line);
            background:
                    linear-gradient(160deg, rgba(255, 241, 213, 0.95), rgba(255, 255, 255, 0)),
                    linear-gradient(180deg, #f8ecd4 0%, #f3e7d1 100%);
        }

        .eyebrow {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(166, 75, 42, 0.1);
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 10px;
            font-size: clamp(36px, 6vw, 54px);
            line-height: 0.98;
        }

        .lead {
            margin: 0;
            max-width: 34ch;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
        }

        .body {
            padding: 28px 34px 34px;
        }

        .card {
            padding: 20px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fcfaf5;
        }

        .card h2 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .button,
        button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .button {
            background: #fff6e8;
            border: 1px solid var(--line);
            color: var(--accent);
        }

        button {
            border: 0;
            background: linear-gradient(180deg, #b4532f 0%, var(--accent-dark) 100%);
            color: white;
        }

        form {
            margin: 0;
        }

    </style>
</head>
<body>
<main>
    <div class="shell">
        <section class="hero">
            <div class="eyebrow">BJ Auth</div>
            <h1>My Account</h1>
            <p class="lead">계정 상태를 확인할 수 있습니다.</p>
        </section>

        <section class="body">
            <div class="card">
                <h2>Profile</h2>
                <p>현재 로그인된 계정을 확인합니다.</p>
            </div>

            <div class="actions">
                <form th:action="@{/logout}" method="post">
                    <button type="submit">Logout</button>
                </form>
            </div>
        </section>
    </div>
</main>
</body>
</html>
