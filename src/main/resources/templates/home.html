<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BJ Auth</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --surface-alt: #fafafa;
            --border: #e4e4e7;
            --text: #09090b;
            --text-sub: #71717a;
            --accent: #18181b;
            --accent-hover: #27272a;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .nav-brand {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .nav form { margin: 0; }

        .nav button {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-sub);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .nav button:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 12px 16px 48px;
        }

        .hero {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px 32px;
            margin-bottom: 16px;
        }

        .eyebrow {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .lead {
            font-size: 16px;
            color: var(--text-sub);
            line-height: 1.6;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .info-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-sub);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
        }

        @media (max-width: 540px) {
            .info-grid { grid-template-columns: 1fr; }
            .hero { padding: 28px 20px; }
        }
    </style>
</head>
<body>
<nav class="nav">
    <div class="nav-brand">BJ Auth</div>
    <form th:action="@{/logout}" method="post">
        <button type="submit">로그아웃</button>
    </form>
</nav>

<main>
    <div class="hero">
        <div class="eyebrow">Account</div>
        <h1>내 계정</h1>
        <p class="lead">BJ Auth 계정 정보를 확인할 수 있습니다.</p>
    </div>

    <div class="info-grid">
        <div class="info-card">
            <div class="info-label">서비스</div>
            <div class="info-value">BJ Auth</div>
        </div>
        <div class="info-card">
            <div class="info-label">상태</div>
            <div class="info-value">활성</div>
        </div>
    </div>
</main>
</body>
</html>
