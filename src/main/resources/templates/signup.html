<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up — BJ Auth</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --surface-alt: #fafafa;
            --border: #e4e4e7;
            --border-focus: #a1a1aa;
            --text: #09090b;
            --text-sub: #71717a;
            --accent: #18181b;
            --accent-hover: #27272a;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 24px 16px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px 32px 32px;
        }

        .brand {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 28px;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 14px;
            margin-bottom: 22px;
        }

        .full { grid-column: 1 / -1; }

        .field label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }

        .field input[type="email"],
        .field input[type="text"],
        .field input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            transition: border-color 0.15s;
        }

        .field input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }

        .field-error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 4px;
        }

        .agreements {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface-alt);
            margin-bottom: 24px;
        }

        .agreement {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 14px;
            line-height: 1.5;
            cursor: pointer;
        }

        .agreement input {
            margin-top: 2px;
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            margin-right: 2px;
        }

        .tag--req { background: #fee2e2; color: var(--danger); }
        .tag--opt { background: #e4e4e7; color: var(--text-sub); }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover { background: var(--accent-hover); }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .footer a {
            color: var(--text);
            font-weight: 600;
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }

        @media (max-width: 540px) {
            .grid { grid-template-columns: 1fr; }
            .card { padding: 32px 20px 24px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">BJ Auth</div>
    <h1>회원가입</h1>

    <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
        <div class="alert" th:if="${#fields.hasAnyErrors()}">
            입력값을 다시 확인해 주세요.
        </div>

        <div class="grid">
            <div class="field full">
                <label for="email">이메일</label>
                <input id="email" type="email" th:field="*{email}" placeholder="name@example.com" autocomplete="email" />
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="field full">
                <label for="displayName">닉네임</label>
                <input id="displayName" type="text" th:field="*{displayName}" placeholder="표시될 이름" autocomplete="nickname" />
                <div class="field-error" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></div>
            </div>

            <div class="field">
                <label for="password">비밀번호</label>
                <input id="password" type="password" th:field="*{password}" placeholder="8자 이상" autocomplete="new-password" />
                <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="field">
                <label for="passwordConfirm">비밀번호 확인</label>
                <input id="passwordConfirm" type="password" th:field="*{passwordConfirm}" placeholder="다시 입력" autocomplete="new-password" />
                <div class="field-error" th:if="${#fields.hasErrors('passwordConfirm')}" th:errors="*{passwordConfirm}"></div>
            </div>
        </div>

        <div class="agreements">
            <label class="agreement">
                <input type="checkbox" th:field="*{termsAgreed}" />
                <span><span class="tag tag--req">필수</span> 이용약관에 동의합니다.</span>
            </label>
            <div class="field-error" th:if="${#fields.hasErrors('termsAgreed')}" th:errors="*{termsAgreed}"></div>

            <label class="agreement">
                <input type="checkbox" th:field="*{privacyAgreed}" />
                <span><span class="tag tag--req">필수</span> 개인정보 수집 및 이용에 동의합니다.</span>
            </label>
            <div class="field-error" th:if="${#fields.hasErrors('privacyAgreed')}" th:errors="*{privacyAgreed}"></div>

            <label class="agreement">
                <input type="checkbox" th:field="*{marketingAgreed}" />
                <span><span class="tag tag--opt">선택</span> 마케팅 정보 수신에 동의합니다.</span>
            </label>
        </div>

        <button type="submit" class="btn">가입하기</button>
    </form>

    <div class="footer">
        이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
    </div>
</div>
</body>
</html>
