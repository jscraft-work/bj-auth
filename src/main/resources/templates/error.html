<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error — BJ Auth</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --surface-alt: #fafafa;
            --border: #e4e4e7;
            --text: #09090b;
            --text-sub: #71717a;
            --accent: #18181b;
            --danger: #dc2626;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 24px 16px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .header {
            padding: 32px 32px 24px;
            border-bottom: 1px solid var(--border);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 700;
            font-family: "SF Mono", "Cascadia Code", monospace;
            letter-spacing: 0.02em;
            background: #fef2f2;
            color: var(--danger);
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-sub);
            line-height: 1.5;
        }

        .body {
            padding: 24px 32px 28px;
        }

        .detail + .detail { margin-top: 16px; }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 6px;
        }

        .detail-value {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-alt);
            font-size: 14px;
            font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
            line-height: 1.6;
            word-break: break-all;
        }

        .back {
            display: inline-block;
            margin-top: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
        }

        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="status-badge" th:text="'HTTP ' + ${status}">HTTP 500</div>
        <h1>요청을 처리할 수 없습니다</h1>
        <p class="subtitle" th:text="${message}">알 수 없는 오류가 발생했습니다.</p>
    </div>

    <div class="body">
        <div class="detail">
            <div class="detail-label">요청 경로</div>
            <div class="detail-value" th:text="${path}">/</div>
        </div>

        <div class="detail" th:if="${query != null and !#strings.isEmpty(query)}">
            <div class="detail-label">Query</div>
            <div class="detail-value" th:text="${query}"></div>
        </div>

        <a class="back" th:href="@{/}">홈으로 돌아가기</a>
    </div>
</div>
</body>
</html>
