<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1e7;
            --panel: #fffdf8;
            --line: #dccfb7;
            --text: #2f281f;
            --muted: #786c5c;
            --accent: #a64b2a;
            --accent-dark: #7d361c;
            --soft: #fff4de;
            --danger: #a03232;
            --shadow: 0 24px 60px rgba(63, 43, 19, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                    radial-gradient(circle at top left, rgba(255, 235, 183, 0.7), transparent 34%),
                    linear-gradient(180deg, #faf6eb 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Iowan Old Style", "Apple SD Gothic Neo", Georgia, serif;
        }

        main {
            width: min(420px, calc(100% - 32px));
            margin: 72px auto;
        }

        .panel {
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .panel h2 {
            margin: 0;
            font-size: 24px;
        }

        .notice {
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: #fcfaf5;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }

        .notice.error {
            color: var(--danger);
            background: #fff3f1;
            border-color: #e6b7b1;
        }

        .notice.success {
            color: #2f6440;
            background: #eff8ec;
            border-color: #b8d7be;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .field input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fffdfa;
            color: var(--text);
            font-size: 16px;
        }

        .field input:focus {
            outline: 2px solid rgba(166, 75, 42, 0.18);
            border-color: var(--accent);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            width: 100%;
            padding: 15px 18px;
            border: 0;
            border-radius: 14px;
            background: linear-gradient(180deg, #b4532f 0%, var(--accent-dark) 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

    </style>
</head>
<body>
<main>
        <section class="panel">
            <h2>Login</h2>

            <div class="notice error" th:if="${param.error}">
                이메일 또는 비밀번호를 다시 확인해 주세요.
            </div>

            <div class="notice success" th:if="${param.logout}">
                안전하게 로그아웃되었습니다.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="text" name="email" autocomplete="email" />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" autocomplete="current-password" />
                </div>

                <div class="actions">
                    <button type="submit">Login</button>
                    <a class="link" th:href="@{/signup}">Create account</a>
                </div>
            </form>
        </section>
</main>
</body>
</html>
