<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — BJ Auth</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --border: #e4e4e7;
            --border-focus: #a1a1aa;
            --text: #09090b;
            --text-sub: #71717a;
            --accent: #18181b;
            --accent-hover: #27272a;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;
            --success: #16a34a;
            --success-bg: #f0fdf4;
            --success-border: #bbf7d0;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 24px 16px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px 32px 32px;
        }

        .brand {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 28px;
        }

        .notice {
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .notice--error {
            color: var(--danger);
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
        }

        .notice--success {
            color: var(--success);
            background: var(--success-bg);
            border: 1px solid var(--success-border);
        }

        .fields {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 24px;
        }

        .field label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text);
        }

        .field input {
            width: 100%;
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            transition: border-color 0.15s;
        }

        .field input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover { background: var(--accent-hover); }

        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .footer a {
            color: var(--text);
            font-weight: 600;
            text-decoration: none;
        }

        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">BJ Auth</div>
    <h1>로그인</h1>

    <div class="notice notice--error" th:if="${param.error}">
        이메일 또는 비밀번호를 다시 확인해 주세요.
    </div>

    <div class="notice notice--success" th:if="${param.logout}">
        안전하게 로그아웃되었습니다.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="fields">
            <div class="field">
                <label for="email">이메일</label>
                <input id="email" type="email" name="email" placeholder="name@example.com" autocomplete="email" />
            </div>
            <div class="field">
                <label for="password">비밀번호</label>
                <input id="password" type="password" name="password" placeholder="8자 이상" autocomplete="current-password" />
            </div>
        </div>
        <button type="submit" class="btn">로그인</button>
    </form>

    <div class="footer">
        계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
    </div>
</div>
</body>
</html>
