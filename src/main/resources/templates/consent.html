<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>권한 요청 — BJ Auth</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --surface: #ffffff;
            --surface-alt: #fafafa;
            --border: #e4e4e7;
            --text: #09090b;
            --text-sub: #71717a;
            --accent: #18181b;
            --accent-hover: #27272a;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { box-sizing: border-box; margin: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding: 24px 16px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px 32px 32px;
        }

        .brand {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .desc {
            font-size: 15px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .desc strong {
            color: var(--text);
        }

        .scopes {
            display: flex;
            flex-direction: column;
            gap: 0;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .scope-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--surface-alt);
            font-size: 14px;
        }

        .scope-item + .scope-item {
            border-top: 1px solid var(--border);
        }

        .scope-item input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .scope-name {
            font-weight: 600;
        }

        .scope-desc {
            color: var(--text-sub);
            font-size: 13px;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .btn--primary {
            color: #fff;
            background: var(--accent);
            border: none;
        }

        .btn--primary:hover { background: var(--accent-hover); }

        .btn--secondary {
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .btn--secondary:hover { background: var(--surface-alt); }

        .user {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">BJ Auth</div>
    <h1>권한 요청</h1>
    <p class="desc">
        <strong th:text="${clientName}">App</strong>이 회원님의 계정 정보에
        접근하려고 합니다.
    </p>

    <form th:action="@{/oauth2/authorize}" method="post">
        <input type="hidden" name="client_id" th:value="${clientId}" />
        <input type="hidden" name="state" th:value="${state}" />
        <input type="hidden" name="scope" value="openid" />

        <div class="scopes">
            <label class="scope-item" th:each="scope : ${scopes}">
                <input type="checkbox" name="scope" th:value="${scope}" checked />
                <div>
                    <div class="scope-name" th:text="${scope}">scope</div>
                    <div class="scope-desc" th:switch="${scope}">
                        <span th:case="'profile'">프로필 정보 (닉네임)</span>
                        <span th:case="'game'">게임 데이터 접근</span>
                        <span th:case="*">추가 권한</span>
                    </div>
                </div>
            </label>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn--secondary" name="cancel" value="">거부</button>
            <button type="submit" class="btn btn--primary">허용</button>
        </div>
    </form>

    <div class="user">
        <span th:text="${principalName}">user@example.com</span> 계정으로 로그인됨
    </div>
</div>
</body>
</html>
